name: Setup Rust
description: Install the Rust toolchain and configure the shared Cargo cache.

inputs:
  shared-key:
    description: Swatinem/rust-cache shared cache key.
    required: false
    default: validation
  targets:
    description: Optional Rust target list to install.
    required: false
    default: ''

runs:
  using: composite
  steps:
    - name: Install Rust toolchain
      if: inputs.targets == ''
      uses: dtolnay/rust-toolchain@stable

    - name: Install Rust toolchain + targets
      if: inputs.targets != ''
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.targets }}

    - name: Install requested Rust targets
      if: inputs.targets != ''
      shell: bash
      env:
        RUST_TARGETS: ${{ inputs.targets }}
      run: |
        set -euo pipefail

        for target in ${RUST_TARGETS//,/ }; do
          rustup target add "$target"
        done

    - name: Cargo cache
      uses: Swatinem/rust-cache@v2
      with:
        shared-key: ${{ inputs.shared-key }}
