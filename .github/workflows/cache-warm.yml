# Cache-warming workflow — runs on main after squash-merge to populate the
# shared Cargo cache so PR branches start warm instead of cold.

name: cache-warm

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/**"
      - "rust-toolchain.toml"
      - ".cargo/**"

jobs:
  warm-cache:
    name: Warm Cargo cache
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-rust
      - run: cargo check --workspace --release
