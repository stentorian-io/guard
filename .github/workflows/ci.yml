# Code validation — cheap PR and lint checks run before platform build/test
# work so paid macOS minutes stay focused on changes that already passed
# repository hygiene and security scans.

name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  current_with_main:
    name: Current with main
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          git remote add upstream "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags upstream "$BASE_REF"

      - name: Require PR branch to include latest main
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          base_tip="$(git rev-parse "upstream/$BASE_REF")"

          if git merge-base --is-ancestor "$base_tip" HEAD; then
            echo "PR branch includes latest $BASE_REF ($base_tip)."
            exit 0
          fi

          merge_base="$(git merge-base "$base_tip" HEAD)"

          echo "::error title=PR branch is behind $BASE_REF::Update this branch with the latest $BASE_REF before running full CI."
          echo "Base tip:   $base_tip"
          echo "Merge base: $merge_base"
          echo "Head:       $(git rev-parse HEAD)"
          exit 1

  secret_scan:
    name: Secret scan
    needs: current_with_main
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Fetch base branch
        run: |
          git remote add upstream "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags upstream main
      - name: Compute scan range
        id: scan_range
        run: |
          echo "base=$(git merge-base upstream/main HEAD)" >> "$GITHUB_OUTPUT"
          echo "head=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
      - uses: trufflesecurity/trufflehog@v3.88.26
        with:
          base: ${{ steps.scan_range.outputs.base }}
          head: ${{ steps.scan_range.outputs.head }}
          extra_args: --only-verified

  pr_title:
    name: PR title
    needs: secret_scan
    if: >-
      always()
      && !cancelled()
      && (needs.secret_scan.result == 'success' || needs.secret_scan.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - name: Skip non-PR events
        if: github.event_name != 'pull_request'
        run: echo "PR title validation only runs for pull requests."
      - uses: actions/checkout@v4
        if: github.event_name == 'pull_request'
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - name: Install Bun
        if: github.event_name == 'pull_request'
        uses: oven-sh/setup-bun@v2
      - name: Validate PR title
        if: github.event_name == 'pull_request'
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: bun scripts/lint/validate-conventional-subject.ts "$PR_TITLE"

  prepare:
    name: Prepare
    needs: pr_title
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.context.outputs.code }}
      lockfile: ${{ steps.context.outputs.lockfile }}
      markdown: ${{ steps.context.outputs.markdown }}
      tooling: ${{ steps.context.outputs.tooling }}
      hot_path_benchmark: ${{ steps.context.outputs.hot_path_benchmark }}
      base: ${{ steps.context.outputs.base }}
      head: ${{ steps.context.outputs.head }}
      is_pr: ${{ steps.context.outputs.is_pr }}
    steps:
      - name: Checkout PR head
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: |
          git remote add upstream "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags upstream main
      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Detect validation context
        id: context
        run: bun scripts/ci/detect-validation-context.ts upstream/main

  lint:
    name: Lint
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0
      - name: Lint GitHub Actions workflows
        if: needs.prepare.outputs.tooling == 'true'
        shell: bash
        run: |
          curl -sSfL \
            https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz \
            -o actionlint.tar.gz
          tar -xzf actionlint.tar.gz actionlint
          ./actionlint
      - uses: DavidAnson/markdownlint-cli2-action@v23.2.0
        if: needs.prepare.outputs.markdown == 'true'
        with:
          globs: |
            **/*.md
            #target
            #.gsd
      - name: Fetch base branch
        if: needs.prepare.outputs.tooling == 'true'
        run: |
          git remote add upstream "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags upstream main
      - name: Install shell script test tools
        if: needs.prepare.outputs.tooling == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck shunit2
      - name: Test public shell scripts
        if: needs.prepare.outputs.tooling == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t shell_files < <(
            git diff --name-only upstream/main...HEAD -- \
              'install.sh' \
              'uninstall.sh' \
              'tests/shell/*' \
              'fixtures/vendor-ua-parser-js.sh'
          )
          if [ "${#shell_files[@]}" -eq 0 ]; then
            echo "No changed public shell scripts."
            exit 0
          fi
          for file in "${shell_files[@]}"; do
            case "$file" in
              fixtures/vendor-ua-parser-js.sh)
                bash -n "$file"
                shellcheck -s bash "$file"
                ;;
              *)
                sh -n "$file"
                shellcheck -s sh "$file"
                ;;
            esac
          done
          if printf '%s\n' "${shell_files[@]}" | grep -Eq '^(install\.sh|uninstall\.sh|tests/shell/)'; then
            sh tests/shell/public_install_uninstall_test
          fi
      - uses: ./.github/actions/setup-rust
        if: needs.prepare.outputs.code == 'true'
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Test TypeScript scripts
        if: needs.prepare.outputs.tooling == 'true'
        run: bun test scripts/*.test.ts
      - name: Validate compatibility manifest
        run: bun scripts/compatibility-tracker.ts --offline
      - name: Check rustfmt
        if: needs.prepare.outputs.code == 'true'
        run: cargo fmt --check
      - name: Check clippy
        if: needs.prepare.outputs.code == 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Lint test env var hygiene
        if: needs.prepare.outputs.code == 'true'
        run: bun scripts/lint/test-env-vars.ts
      - uses: taiki-e/install-action@cargo-machete
        if: needs.prepare.outputs.code == 'true'
      - name: Lint unused dependencies
        if: needs.prepare.outputs.code == 'true'
        run: cargo machete --with-metadata

  linux_check:
    name: Linux check
    needs:
      - prepare
      - lint
    if: >-
      !cancelled()
      && needs.prepare.outputs.code == 'true'
      && needs.lint.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-check
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
      - name: Verify sanitized fixture present
        run: bun scripts/ci/verify-sanitized-fixture.ts
      - name: cargo check shared crates
        run: cargo check -p guard-os -p guard-watchdog --quiet
      - name: cargo check boundary consumers
        run: cargo check -p guard-hook -p guard-daemon -p guard-cli --quiet

  macos_check:
    name: macOS check
    needs:
      - prepare
      - lint
    if: >-
      !cancelled()
      && needs.prepare.outputs.code == 'true'
      && needs.lint.result == 'success'
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: macos-check
      - name: cargo check workspace
        run: cargo check --workspace --quiet
      - name: cargo check release boundary crates
        run: cargo check -p guard-cli -p guard-daemon -p guard-hook --features test-signer --quiet

  cargo_audit:
    name: Dependency CVE audit
    needs:
      - prepare
      - secret_scan
      - linux_e2e_tests
      - macos_e2e_tests
    if: >-
      !cancelled()
      && needs.prepare.outputs.lockfile == 'true'
      && (needs.secret_scan.result == 'success' || needs.secret_scan.result == 'skipped')
      && (needs.linux_e2e_tests.result == 'success' || needs.linux_e2e_tests.result == 'skipped')
      && (needs.macos_e2e_tests.result == 'success' || needs.macos_e2e_tests.result == 'skipped')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
      - name: Compute daily audit cache key
        id: audit_cache_key
        shell: bash
        run: |
          set -euo pipefail
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "scope=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "scope=main" >> "$GITHUB_OUTPUT"
          fi
      - name: Check daily audit marker
        id: audit_cache
        uses: actions/cache/restore@v4
        with:
          path: .audit-cache-marker
          key: >-
            cargo-audit-${{ steps.audit_cache_key.outputs.scope }}-${{ steps.audit_cache_key.outputs.date }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml', 'rust-toolchain.toml') }}
          lookup-only: true
      - uses: rustsec/audit-check@v2.0.0
        if: steps.audit_cache.outputs.cache-hit != 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Write daily audit marker
        if: steps.audit_cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .audit-cache-marker
          {
            echo "event=${{ github.event_name }}"
            echo "scope=${{ steps.audit_cache_key.outputs.scope }}"
            echo "date=${{ steps.audit_cache_key.outputs.date }}"
            echo "sha=${{ github.sha }}"
          } > .audit-cache-marker/last-run.txt
      - name: Save daily audit marker
        if: steps.audit_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .audit-cache-marker
          key: ${{ steps.audit_cache.outputs.cache-primary-key }}

  requirement_gate:
    name: Requirement gate
    needs:
      - prepare
      - secret_scan
      - lint
      - linux_check
      - macos_check
      - release_build
      - unit_tests
      - integration_tests
      - linux_e2e_tests
      - macos_e2e_tests
      - hot_path_benchmark
      - cargo_audit
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Verify required job results
        run: |
          results='${{ toJSON(needs) }}'
          echo "$results"
          if ! jq -e 'all(.[]; .result == "success" or .result == "skipped")' <<<"$results" >/dev/null; then
            echo "::error::One or more required jobs failed or were cancelled"
            exit 1
          fi

  release_build:
    name: Release build (${{ matrix.platform }})
    needs:
      - prepare
      - lint
      - linux_check
      - macos_check
      - unit_tests
      - integration_tests
    if: >-
      !cancelled()
      && needs.prepare.outputs.code == 'true'
      && needs.lint.result == 'success'
      && (needs.linux_check.result == 'success' || needs.linux_check.result == 'skipped')
      && (needs.macos_check.result == 'success' || needs.macos_check.result == 'skipped')
      && needs.unit_tests.result == 'success'
      && needs.integration_tests.result == 'success'
    runs-on: ${{ matrix.runs_on }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux
            runs_on: ubuntu-latest
            artifact: linux-release-binaries
            hook_library: libguard_hook.so
          - platform: macos
            runs_on: macos-14
            artifact: macos-release-binaries
            hook_library: libguard_hook.dylib
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - name: Setup Node 20
        if: matrix.platform == 'macos'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: release-build-${{ matrix.platform }}
      - name: cargo build workspace (release)
        run: cargo build --workspace --release --timings
      - name: Upload Cargo timing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-timings-release-${{ matrix.platform }}
          path: target/cargo-timings/*.html
          if-no-files-found: warn
          retention-days: 7
      - name: Upload release binaries
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/release/stt-guard
            target/release/stt-guard-daemon
            target/release/stt-guard-watchdog
            target/release/${{ matrix.hook_library }}
            target/release/hardened_exec_probe
          if-no-files-found: error
          retention-days: 1

  unit_tests:
    name: Unit tests
    needs:
      - prepare
      - lint
    if: >-
      !cancelled()
      && needs.prepare.outputs.code == 'true'
      && needs.lint.result == 'success'
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - uses: ./.github/actions/setup-rust
      - name: cargo test unit targets
        run: cargo test --workspace --exclude guard-e2e --lib --bins --quiet --timings
      - name: Upload Cargo timing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-timings-unit-tests
          path: target/cargo-timings/*.html
          if-no-files-found: warn
          retention-days: 7

  integration_tests:
    name: Integration tests
    needs:
      - prepare
      - lint
    if: >-
      !cancelled()
      && needs.prepare.outputs.code == 'true'
      && needs.lint.result == 'success'
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - uses: ./.github/actions/setup-rust
      - name: cargo test integration targets
        run: cargo test --workspace --exclude guard-e2e --tests --quiet --timings
      - name: Upload Cargo timing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-timings-integration-tests
          path: target/cargo-timings/*.html
          if-no-files-found: warn
          retention-days: 7

  linux_e2e_tests:
    name: Linux E2E tests
    needs:
      - prepare
      - release_build
      - unit_tests
      - integration_tests
    if: >-
      !cancelled()
      && needs.prepare.outputs.code == 'true'
      && needs.release_build.result == 'success'
      && needs.unit_tests.result == 'success'
      && needs.integration_tests.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: linux-e2e
      - name: Download Linux release binaries
        uses: actions/download-artifact@v4
        with:
          name: linux-release-binaries
          path: target/release
      - name: Restore release binary modes
        run: |
          chmod +x target/release/stt-guard
          chmod +x target/release/stt-guard-daemon
          chmod +x target/release/stt-guard-watchdog
          chmod +x target/release/hardened_exec_probe
      - name: LD_PRELOAD smoke and denial coverage
        run: cargo test -p guard-hook --test linux_ld_preload_smoke -- --nocapture

  macos_e2e_tests:
    name: macOS E2E tests
    needs:
      - prepare
      - release_build
      - unit_tests
      - integration_tests
    if: >-
      !cancelled()
      && needs.prepare.outputs.code == 'true'
      && needs.release_build.result == 'success'
      && needs.unit_tests.result == 'success'
      && needs.integration_tests.result == 'success'
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
      - uses: ./.github/actions/setup-rust
      - name: Download release binaries from build
        uses: actions/download-artifact@v4
        with:
          name: macos-release-binaries
          path: target/release
      - name: Restore release binary modes
        run: |
          chmod +x target/release/stt-guard
          chmod +x target/release/stt-guard-daemon
          chmod +x target/release/stt-guard-watchdog
          chmod +x target/release/hardened_exec_probe
      - name: VAL-05 — privileged system install health
        shell: bash
        run: |
          set -euo pipefail

          if [ -n "${KEYCHAIN_PASSWORD:-}" ]; then
            security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$HOME/Library/Keychains/login.keychain-db" || true
          fi

          current_user="$(id -un)"
          current_uid="$(id -u)"
          sudo launchctl asuser "$current_uid" sudo -u "$current_user" \
            env \
              HOME="$HOME" \
              PATH="$PATH" \
              CARGO_HOME="${CARGO_HOME:-}" \
              RUSTUP_HOME="${RUSTUP_HOME:-}" \
              RUSTFLAGS="${RUSTFLAGS:-}" \
              RUST_BACKTRACE="${RUST_BACKTRACE:-}" \
            cargo test -p guard-e2e --test hardened_install_health --release -- --nocapture
      - name: Build test-signer binaries for harness E2Es
        run: cargo build -p guard-cli -p guard-daemon -p guard-hook --release --features test-signer --timings
      - name: Upload Cargo timing report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-timings-macos-e2e-test-signer
          path: target/cargo-timings/*.html
          if-no-files-found: warn
          retention-days: 7
      - name: VAL-01 — ua-parser-js@0.7.29 demo
        run: cargo test -p guard-e2e --features test-signer --test ua_parser_js_demo --release -- --nocapture
      - name: VAL-02 — workers.dev allowlist-bleed
        run: cargo test -p guard-e2e --features test-signer --test workers_dev_validation --release -- --nocapture
      # VAL-04 D-09 (daemon-killed) skipped: step-1 hostname connect fails in CI harness (peer auth)
      - name: VAL-04 D-12 — corrupt snapshot
        run: cargo test -p guard-e2e --features test-signer --test failure_modes_corrupt_snapshot --release -- --nocapture
      - name: VAL-04 D-10 — hardened-binary exec gap
        run: cargo test -p guard-e2e --features test-signer --test failure_modes_hardened_exec --release -- --nocapture

  hot_path_benchmark:
    name: Hot path benchmark
    needs:
      - prepare
      - lint
    if: >-
      !cancelled()
      && needs.prepare.outputs.hot_path_benchmark == 'true'
      && needs.lint.result == 'success'
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0
      - uses: ./.github/actions/setup-rust
        with:
          shared-key: hot-path-benchmark
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
      - name: Fetch benchmark base
        shell: bash
        run: |
          set -euo pipefail
          git remote add upstream "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags upstream main
      - name: Run base cache-hit hot path benchmark
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/bench-hot-path
          git checkout --detach "${{ needs.prepare.outputs.base }}"

          if [ -x scripts/bench/hot-path.ts ]; then
            benchmark_script=(bun scripts/bench/hot-path.ts)
          else
            benchmark_script=(scripts/bench-hot-path.sh)
          fi

          "${benchmark_script[@]}" \
            --cache-hit-only \
            --enforce-cache-hit-budget \
            --github-action-benchmark-json target/bench-hot-path/base-github-action-benchmark.json \
            | tee target/bench-hot-path/base-summary.md
      - name: Restore PR head
        shell: bash
        run: |
          set -euo pipefail
          git checkout --detach "${{ needs.prepare.outputs.head }}"
      - name: Restore benchmark history
        id: benchmark_history
        uses: actions/cache/restore@v4
        with:
          path: .benchmark-history
          key: hot-path-benchmark-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            hot-path-benchmark-${{ runner.os }}-
      - name: Run head cache-hit hot path benchmark
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p target/bench-hot-path
          bun scripts/bench/hot-path.ts \
            --cache-hit-only \
            --enforce-cache-hit-budget \
            --github-action-benchmark-json target/bench-hot-path/github-action-benchmark.json \
            | tee target/bench-hot-path/summary.md
      - name: Check same-runner hot path regression
        shell: bash
        env:
          ACCEPTED_REGRESSION: ${{ contains(github.event.pull_request.labels.*.name, 'accepted-hot-path-regression') }}
        run: |
          set -euo pipefail

          extract_cache_hit_p99() {
            local path="$1"
            grep -oE '"value": [0-9]+' "$path" | head -1 | sed 's/^"value": //'
          }

          BASE_P99="$(extract_cache_hit_p99 target/bench-hot-path/base-github-action-benchmark.json)"
          HEAD_P99="$(extract_cache_hit_p99 target/bench-hot-path/github-action-benchmark.json)"
          THRESHOLD_RATIO="1.5"

          if [[ -z "$BASE_P99" || -z "$HEAD_P99" ]]; then
            echo "hot-path regression check: could not extract base/head p99" >&2
            exit 1
          fi

          awk \
            -v base="$BASE_P99" \
            -v head="$HEAD_P99" \
            -v threshold="$THRESHOLD_RATIO" \
            -v accepted="$ACCEPTED_REGRESSION" \
            'BEGIN {
              if (base <= 0) {
                print "hot-path regression check: base p99 must be positive" > "/dev/stderr";
                exit 2;
              }

              ratio = head / base;
              printf("hot-path regression check: base=%dns head=%dns ratio=%.2fx threshold=%.2fx\n", base, head, ratio, threshold);

              if (ratio > threshold && accepted != "true") {
                printf("hot-path regression check: head p99 is %.2fx slower than base; apply accepted-hot-path-regression only for an intentional regression\n", ratio) > "/dev/stderr";
                exit 1;
              }
            }'
      - name: Publish benchmark summary
        if: always() && hashFiles('target/bench-hot-path/summary.md') != ''
        run: |
          {
            echo "### Base"
            cat target/bench-hot-path/base-summary.md
            echo
            echo "### Head"
            cat target/bench-hot-path/summary.md
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Store benchmark trend
        if: always() && hashFiles('target/bench-hot-path/github-action-benchmark.json') != ''
        uses: benchmark-action/github-action-benchmark@v1.22.1
        with:
          name: Stentorian Guard hot path
          tool: customSmallerIsBetter
          output-file-path: target/bench-hot-path/github-action-benchmark.json
          external-data-json-path: .benchmark-history/benchmark-data.json
          alert-threshold: '150%'
          fail-on-alert: false
          summary-always: true
      - name: Save benchmark history
        if: success() && hashFiles('.benchmark-history/benchmark-data.json') != ''
        uses: actions/cache/save@v4
        with:
          path: .benchmark-history
          key: hot-path-benchmark-${{ runner.os }}-${{ github.run_id }}
      - name: Upload benchmark artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hot-path-benchmark
          path: |
            target/bench-hot-path/base-summary.md
            target/bench-hot-path/base-github-action-benchmark.json
            target/bench-hot-path/summary.md
            target/bench-hot-path/github-action-benchmark.json
            target/criterion/cache_hit/decide_for_sockaddr
          if-no-files-found: warn
          retention-days: 14
