# Code validation — cheap Linux checks run before macOS build/test work to keep
# paid macOS minutes focused on changes that already passed repository hygiene
# and platform-boundary checks.

name: CI

on:
  pull_request:
    branches: [main]
  schedule:
    # Nightly at 06:15 UTC — catches new advisories in the RustSec DB even when
    # no lockfile-changing PR is open.
    - cron: '15 6 * * *'

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read
  pull-requests: read

jobs:
  prepare:
    name: Prepare validation context
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.changes.outputs.code }}
      lockfile: ${{ steps.changes.outputs.lockfile }}
      markdown: ${{ steps.changes.outputs.markdown }}
      scan_base: ${{ steps.range.outputs.base }}
      scan_head: ${{ steps.range.outputs.head }}
      is_pr: ${{ steps.context.outputs.is_pr }}
    steps:
      - name: Checkout PR head
        if: github.event_name == 'pull_request'
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Checkout scheduled ref
        if: github.event_name == 'schedule'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        if: github.event_name == 'pull_request'
        run: |
          git remote add upstream "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags upstream main

      - name: Detect validation-relevant changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "schedule" ]; then
            {
              echo "code=false"
              echo "lockfile=true"
              echo "markdown=false"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base_ref="upstream/main"
          changed=$(git diff --name-only "$base_ref...HEAD")
          printf 'Changed files:\n%s\n' "$changed"

          code=false
          lockfile=false
          markdown=false
          while IFS= read -r path; do
            [ -n "$path" ] || continue
            case "$path" in
              *.rs|*/Cargo.toml|Cargo.toml|*/Cargo.lock|Cargo.lock|rust-toolchain.toml|crates/guard-e2e/fixtures/*|crates/guard-e2e/harness/*|crates/guard-core/data/*|scripts/*.sh|tools/*)
                code=true
                ;;
            esac
            case "$path" in
              */Cargo.toml|Cargo.toml|*/Cargo.lock|Cargo.lock|rust-toolchain.toml)
                lockfile=true
                ;;
            esac
            case "$path" in
              *.md)
                markdown=true
                ;;
            esac
          done <<< "$changed"

          {
            echo "code=$code"
            echo "lockfile=$lockfile"
            echo "markdown=$markdown"
          } >> "$GITHUB_OUTPUT"

      - name: Compute secret scan range
        id: range
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base=$(git merge-base upstream/main HEAD)
            head=$(git rev-parse HEAD)
            echo "base=$base" >> "$GITHUB_OUTPUT"
            echo "head=$head" >> "$GITHUB_OUTPUT"
            echo "Secret scan range: $base..$head"
          else
            echo "base=" >> "$GITHUB_OUTPUT"
            echo "head=" >> "$GITHUB_OUTPUT"
          fi

      - name: Record event context
        id: context
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "is_pr=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_pr=false" >> "$GITHUB_OUTPUT"
          fi

  pr_title:
    name: PR title
    needs: prepare
    if: needs.prepare.outputs.is_pr == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        id: lint_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            test
            docs
            chore
            ci
          scopes: |
            cli
            daemon
            hook
            core
            ipc
            watchdog
            e2e
            bench
            readme
            llm
            man
            help
            install
            release
            security
          requireScope: false
          subjectPattern: ^(?![A-Z]).+(?<!\.)$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            must start with a lowercase letter and not end with a period.
      - if: steps.lint_pr.outputs.type == 'ci' && steps.lint_pr.outputs.scope != ''
        run: |
          echo "::error::Scopes are not allowed for the 'ci' type. Use 'ci: ...' not 'ci(scope): ...'"
          exit 1

  markdown_lint:
    name: Markdown lint
    needs: prepare
    if: needs.prepare.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - run: npx markdownlint-cli2 "**/*.md" "#target" "#.gsd"

  pr_checks:
    name: PR checks
    if: always()
    needs:
      - prepare
      - pr_title
      - markdown_lint
    runs-on: ubuntu-latest
    steps:
      - run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "PR check results: $results"
          if echo "$results" | grep -qE '"(failure|cancelled)"'; then
            echo "::error::One or more PR checks failed or were cancelled"
            exit 1
          fi

  lint:
    name: Lint
    needs:
      - prepare
      - pr_checks
    if: needs.prepare.outputs.code == 'true' && needs.pr_checks.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-machete
      - name: Lint test env var hygiene
        run: scripts/lint-test-env-vars.sh
      - name: Lint unused dependencies
        run: cargo machete --with-metadata

  linux_compile_gate:
    name: Linux compile gate
    needs:
      - prepare
      - lint
    if: needs.prepare.outputs.code == 'true' && needs.lint.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - uses: dtolnay/rust-toolchain@stable
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: linux-compile-gate
      - name: Verify sanitized fixture present
        run: |
          set -euo pipefail
          fixture=crates/guard-e2e/fixtures/ua-parser-js-0.7.29-sanitized/ua-parser-js-0.7.29-sanitized.tgz
          test -f "$fixture" || { echo "FATAL: sanitized fixture missing"; exit 1; }
          actual=$(sha256sum "$fixture" | awk '{print $1}')
          echo "Fixture SHA-256: $actual"
          matches=$(grep -c '^EXPECTED_OUTPUT_SHA256="[a-f0-9]\{64\}"$' \
                    tools/vendor-ua-parser-js.sh || true)
          if [ "$matches" -ne 1 ]; then
            echo "FATAL: expected exactly one EXPECTED_OUTPUT_SHA256=\"<64-hex>\" line in tools/vendor-ua-parser-js.sh, found $matches"
            exit 1
          fi
          pinned=$(grep '^EXPECTED_OUTPUT_SHA256="[a-f0-9]\{64\}"$' \
                   tools/vendor-ua-parser-js.sh \
                   | sed -E 's/^EXPECTED_OUTPUT_SHA256="([a-f0-9]{64})"$/\1/')
          if [ -z "$pinned" ] || [ "$pinned" = "<FILL_ON_FIRST_RUN>" ]; then
            echo "FATAL: tools/vendor-ua-parser-js.sh has no committed pinned hash"
            exit 1
          fi
          if [ "$actual" != "$pinned" ]; then
            echo "FATAL: fixture hash mismatch — fixture drifted from script pin"
            echo "  script pin: $pinned"
            echo "  on-disk:    $actual"
            exit 1
          fi
          echo "Fixture hash matches script pin."
      - name: cargo check shared crates
        run: cargo check -p guard-os -p guard-watchdog --quiet
      - name: cargo check boundary consumers
        run: cargo check -p guard-hook -p guard-daemon -p guard-cli --quiet
      - name: cargo test OS boundary crate
        run: cargo test -p guard-os --quiet
      - name: cargo test shared core
        run: cargo test -p guard-core --lib --tests --quiet
      - name: cargo test shared IPC
        run: cargo test -p guard-ipc --lib --tests --quiet
      - name: cargo test watchdog
        run: cargo test -p guard-watchdog --bins --quiet

  secret_scan:
    name: Secret scan
    needs:
      - prepare
    if: needs.prepare.outputs.is_pr == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
      - name: Fetch base branch
        run: |
          git remote add upstream "https://github.com/${{ github.repository }}.git"
          git fetch --no-tags upstream main
      - uses: trufflesecurity/trufflehog@v3.88.26
        with:
          base: ${{ needs.prepare.outputs.scan_base }}
          head: ${{ needs.prepare.outputs.scan_head }}
          extra_args: --only-verified

  cargo_audit:
    name: Dependency CVE audit
    needs:
      - prepare
      - secret_scan
    if: >-
      always()
      && (github.event_name == 'schedule'
          || (needs.prepare.outputs.lockfile == 'true' && needs.secret_scan.result == 'success'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
      - name: Compute daily audit cache key
        id: audit_cache_key
        shell: bash
        run: |
          set -euo pipefail
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "scope=pr-${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "scope=main" >> "$GITHUB_OUTPUT"
          fi
      - name: Check daily audit marker
        id: audit_cache
        uses: actions/cache/restore@v4
        with:
          path: .audit-cache-marker
          key: >-
            cargo-audit-${{ steps.audit_cache_key.outputs.scope }}-${{ steps.audit_cache_key.outputs.date }}-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/**/Cargo.toml', 'rust-toolchain.toml') }}
          lookup-only: true
      - uses: rustsec/audit-check@v2.0.0
        if: steps.audit_cache.outputs.cache-hit != 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Write daily audit marker
        if: steps.audit_cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .audit-cache-marker
          {
            echo "event=${{ github.event_name }}"
            echo "scope=${{ steps.audit_cache_key.outputs.scope }}"
            echo "date=${{ steps.audit_cache_key.outputs.date }}"
            echo "sha=${{ github.sha }}"
          } > .audit-cache-marker/last-run.txt
      - name: Save daily audit marker
        if: steps.audit_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .audit-cache-marker
          key: ${{ steps.audit_cache.outputs.cache-primary-key }}

  build:
    name: Build
    needs:
      - prepare
      - lint
      - linux_compile_gate
      - secret_scan
      - cargo_audit
    if: >-
      needs.prepare.outputs.code == 'true'
      && needs.lint.result == 'success'
      && needs.linux_compile_gate.result == 'success'
      && (needs.secret_scan.result == 'success' || needs.secret_scan.result == 'skipped')
      && (needs.cargo_audit.result == 'success' || needs.cargo_audit.result == 'skipped')
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: validation
      - name: cargo build workspace (release)
        run: cargo build --workspace --release
      - name: Upload release binaries for E2E
        uses: actions/upload-artifact@v4
        with:
          name: macos-release-binaries
          path: |
            target/release/stt-guard
            target/release/stt-guard-daemon
            target/release/stt-guard-watchdog
            target/release/libguard_hook.dylib
            target/release/hardened_exec_probe
          if-no-files-found: error
          retention-days: 1

  unit_tests:
    name: Unit tests
    needs:
      - prepare
      - build
    if: needs.prepare.outputs.code == 'true' && needs.build.result == 'success'
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: validation
      - name: cargo test unit targets
        run: cargo test --workspace --exclude guard-e2e --lib --bins --quiet

  integration_tests:
    name: Integration tests
    needs:
      - prepare
      - unit_tests
    if: needs.prepare.outputs.code == 'true' && needs.unit_tests.result == 'success'
    runs-on: macos-14
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: validation
      - name: cargo test integration targets
        run: cargo test --workspace --exclude guard-e2e --tests --quiet

  e2e_tests:
    name: E2E tests
    needs:
      - prepare
      - integration_tests
    if: needs.prepare.outputs.code == 'true' && needs.integration_tests.result == 'success'
    runs-on: macos-14
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: validation
      - name: Download release binaries from build
        uses: actions/download-artifact@v4
        with:
          name: macos-release-binaries
          path: target/release
      - name: Restore release binary modes
        run: |
          chmod +x target/release/stt-guard
          chmod +x target/release/stt-guard-daemon
          chmod +x target/release/stt-guard-watchdog
          chmod +x target/release/hardened_exec_probe
      - name: VAL-01 — ua-parser-js@0.7.29 demo
        run: cargo test -p guard-e2e --test ua_parser_js_demo --release -- --nocapture
      - name: VAL-02 — workers.dev allowlist-bleed
        run: cargo test -p guard-e2e --test workers_dev_validation --release -- --nocapture
      # VAL-04 D-09 (daemon-killed) skipped: step-1 hostname connect fails in CI harness (peer auth)
      - name: VAL-04 D-12 — corrupt snapshot
        run: cargo test -p guard-e2e --test failure_modes_corrupt_snapshot --release -- --nocapture
      - name: VAL-04 D-10 — hardened-binary exec gap
        run: cargo test -p guard-e2e --test failure_modes_hardened_exec --release -- --nocapture
      - name: VAL-05 — privileged init and install health
        run: cargo test -p guard-e2e --test hardened_install_health --release -- --nocapture
        env:
          STT_GUARD_E2E_PRIVILEGED_INSTALL: '1'

  gate:
    name: Gate
    if: always()
    needs:
      - prepare
      - pr_checks
      - lint
      - linux_compile_gate
      - build
      - unit_tests
      - integration_tests
      - e2e_tests
      - secret_scan
      - cargo_audit
    runs-on: ubuntu-latest
    steps:
      - run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"(failure|cancelled)"'; then
            echo "::error::One or more validation jobs failed or were cancelled"
            exit 1
          fi
