# Nightly feed update — extracts host IOCs from ossf/malicious-packages and
# writes crates/sentinel-core/data/deny/ossf-malicious-packages.yaml. If the
# file changed, opens a PR so the diff is reviewable before merge.

name: feed-update

on:
  schedule:
    - cron: '15 4 * * *'  # 04:15 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-feed:
    name: Update threat-intel feed rules
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache ossf/malicious-packages clone
        uses: actions/cache@v4
        with:
          path: /tmp/malicious-packages
          key: ossf-malicious-packages

      - name: Clone or update ossf/malicious-packages
        run: |
          set -euo pipefail
          if [ -d /tmp/malicious-packages/.git ]; then
            echo "Cache hit — fetching latest"
            git -C /tmp/malicious-packages fetch --depth 1 origin main
            git -C /tmp/malicious-packages reset --hard origin/main
          else
            echo "Cache miss — shallow cloning"
            rm -rf /tmp/malicious-packages
            git clone --depth 1 --single-branch --branch main \
              https://github.com/ossf/malicious-packages.git \
              /tmp/malicious-packages
          fi

      - name: Extract OSSF IOCs
        run: scripts/update-feed-rules.sh --repo-dir /tmp/malicious-packages

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet crates/sentinel-core/data/deny/ossf-malicious-packages.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          branch="chore/feed-update-$(date +%Y%m%d)"
          git checkout -b "$branch"
          git add crates/sentinel-core/data/deny/ossf-malicious-packages.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(core): update threat-intel feed IOCs from ossf/malicious-packages"
          git push -u origin "$branch"
          gh pr create \
            --title "chore(core): update threat-intel feed IOCs" \
            --body "Automated nightly update of \`crates/sentinel-core/data/deny/ossf-malicious-packages.yaml\` with host IOCs extracted from [ossf/malicious-packages](https://github.com/ossf/malicious-packages)." \
            --base main \
            --head "$branch"
