# Nightly feed update — downloads the combined OSV.dev bulk archive (all
# ecosystems), extracts host IOCs from MAL-* advisories, and writes them to
# the deny rules file. If the file changed, opens a PR for review.

name: feed-update

on:
  schedule:
    - cron: '15 4 * * *'  # 04:15 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write
  statuses: write

concurrency:
  group: feed-update
  cancel-in-progress: false

jobs:
  update-feed:
    name: Update threat-intel feed rules
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: ./.github/actions/setup-rust
        with:
          shared-key: feed-update

      - name: Select feed update branch
        id: feed_branch
        run: |
          set -euo pipefail
          branch="chore/feed-update"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --no-tags origin main

          if git ls-remote --exit-code --heads origin "$branch" >/dev/null 2>&1; then
            git fetch --no-tags origin "refs/heads/$branch:refs/remotes/origin/$branch"
          fi

          git checkout -B "$branch" "origin/main"
          echo "branch=$branch" >> "$GITHUB_OUTPUT"

      - name: Extract OSV.dev IOCs
        run: scripts/update-feed-rules.sh

      - name: Check for changes
        id: diff
        run: |
          target="crates/guard-core/data/malicious-ossf-packages.yaml"

          if ! git diff --quiet -- "$target"; then
            git add "$target"
            git commit -m "chore(core): update threat-intel feed IOCs from OSV.dev"
          fi

          if git diff --quiet origin/main -- "$target"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate feed update branch
        if: steps.diff.outputs.changed == 'true'
        run: scripts/validate-feed-update-pr.sh origin/main

      - name: Publish feed update PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          branch="${{ steps.feed_branch.outputs.branch }}"
          git push --force-with-lease -u origin "$branch"

          existing_pr="$(gh pr list \
            --state open \
            --head "$branch" \
            --json number \
            --jq '.[0].number // ""')"

          if [[ -z "$existing_pr" ]]; then
            gh pr create \
              --title "chore(core): update threat-intel feed IOCs" \
              --body "Automated nightly update of \`crates/guard-core/data/malicious-ossf-packages.yaml\` with host IOCs extracted from [OSV.dev](https://osv.dev) malicious-package advisories (MAL-*)." \
              --base main \
              --head "$branch"
          fi

      - name: Publish feed validation status
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          head_sha="$(git rev-parse HEAD)"
          target_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          gh api \
            --method POST \
            "repos/${GITHUB_REPOSITORY}/statuses/${head_sha}" \
            -f state=success \
            -f context="Requirement gate" \
            -f description="Generated feed YAML validation passed" \
            -f target_url="$target_url"
