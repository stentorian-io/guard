# Nightly feed update — downloads the combined OSV.dev bulk archive (all
# ecosystems), extracts host IOCs from MAL-* advisories, and writes them to
# the deny rules file. If the file changed, opens a PR for review.

name: feed-update

on:
  schedule:
    - cron: '15 4 * * *'  # 04:15 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  update-feed:
    name: Update threat-intel feed rules
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract OSV.dev IOCs
        run: scripts/update-feed-rules.sh

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet crates/sentinel-core/data/deny/ossf-malicious-packages.yaml; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          branch="chore/feed-update-$(date +%Y%m%d)"
          git checkout -b "$branch"
          git add crates/sentinel-core/data/deny/ossf-malicious-packages.yaml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(core): update threat-intel feed IOCs from OSV.dev"
          git push -u origin "$branch"
          gh pr create \
            --title "chore(core): update threat-intel feed IOCs" \
            --body "Automated nightly update of \`crates/sentinel-core/data/deny/ossf-malicious-packages.yaml\` with host IOCs extracted from [OSV.dev](https://osv.dev) malicious-package advisories (MAL-*)." \
            --base main \
            --head "$branch"
