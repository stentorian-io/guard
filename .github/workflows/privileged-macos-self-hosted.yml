# Manual privileged install-health validation on a disposable self-hosted macOS
# runner. Do not attach this to automatic pull_request execution; it runs PR
# code with passwordless sudo and mutates system install locations.

name: Privileged macOS self-hosted

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to validate
        required: true
        default: main

concurrency:
  group: privileged-macos-self-hosted-${{ github.event.inputs.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  install_health:
    name: Privileged install health
    runs-on:
      - self-hosted
      - macOS
      - stt-guard-privileged
      - disposable
    timeout-minutes: 45
    steps:
      - name: Verify disposable privileged runner contract
        shell: bash
        run: |
          set -euo pipefail
          if [ "${STT_GUARD_DISPOSABLE_RUNNER:-}" != "1" ]; then
            echo "::error::Refusing to run without STT_GUARD_DISPOSABLE_RUNNER=1 in the runner environment."
            exit 1
          fi
          sudo -n true

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: ./.github/actions/setup-rust
        with:
          shared-key: privileged-macos-self-hosted

      - name: Build release payload with test signer
        run: cargo build -p guard-cli -p guard-daemon -p guard-hook -p guard-watchdog --release --features test-signer

      - name: Run privileged install-health E2E
        run: cargo test -p guard-e2e --features test-signer --test hardened_install_health --release -- --nocapture
        env:
          STT_GUARD_E2E_PRIVILEGED_INSTALL: '1'
