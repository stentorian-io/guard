# Release workflow — builds target-specific macOS artifacts, generates
# changelog and release-meta.json, and creates a GitHub Release for installer
# automation and maintainer audit trails.
#
# Triggered by pushing a semver tag (v0.1.0, v0.2.0, etc.).
# Can also be triggered manually via workflow_dispatch for dry-run testing.
#
# Supported install path: the repo-hosted installer downloads these GitHub
# Release artifacts and invokes the hardened system install path. Raw release artifacts
# are not a documented manual install surface because incorrect placement,
# ownership, or plist setup can weaken the deployment model.
#
# Artifacts per target: stt-guard, stt-guard-daemon, stt-guard-watchdog,
#                       stt-guard-hook.dylib, release-meta.json

name: release

on:
  push:
    tags:
      - 'v[0-9]+.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build (for example, v0.2.0). Leave empty for dry-run builds.'
        required: false
        default: ''
        type: string
      dry_run:
        description: 'Dry run (skip GitHub Release creation)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write

jobs:
  validate:
    name: Validate release tag
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout exact release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Validate release tag is on main
        if: github.event_name == 'push' || inputs.tag != ''
        run: |
          set -euo pipefail

          git fetch --no-tags origin main

          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi

          release_commit="$(git rev-list -n 1 "$TAG")"
          main_commit="$(git rev-parse origin/main)"

          if ! git merge-base --is-ancestor "$release_commit" "$main_commit"; then
            echo "release tag $TAG points to $release_commit, which is not on origin/main $main_commit" >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: macos-14
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - uses: ./.github/actions/setup-rust
        with:
          shared-key: release-${{ matrix.target }}
          targets: ${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --workspace --release --target ${{ matrix.target }}

      - name: Stage target artifacts
        run: |
          set -euo pipefail
          mkdir -p "artifacts/${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/stt-guard" "artifacts/${{ matrix.target }}/"
          cp "target/${{ matrix.target }}/release/stt-guard-daemon" "artifacts/${{ matrix.target }}/"
          cp "target/${{ matrix.target }}/release/stt-guard-watchdog" "artifacts/${{ matrix.target }}/"
          cp "target/${{ matrix.target }}/release/libguard_hook.dylib" "artifacts/${{ matrix.target }}/stt-guard-hook.dylib"

      - name: Verify target artifacts
        run: |
          set -euo pipefail
          for f in "artifacts/${{ matrix.target }}"/*; do
            echo "=== $(basename "$f") ==="
            file "$f"
          done

      - name: Upload target artifacts
        uses: actions/upload-artifact@v4
        with:
          name: guard-${{ matrix.target }}
          path: artifacts/${{ matrix.target }}/
          retention-days: 5

  package:
    name: Package release candidates
    needs: build
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      arm64_sha256: ${{ steps.package.outputs.arm64_sha256 }}
      x86_64_sha256: ${{ steps.package.outputs.x86_64_sha256 }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: guard-*
          path: artifacts/

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2
      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          elif [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="v0.0.0-dryrun"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 "${{ steps.version.outputs.tag }}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            git cliff "${PREV_TAG}..${{ steps.version.outputs.tag }}" --output CHANGELOG.md
          else
            git cliff --output CHANGELOG.md
          fi

      - name: Generate release-meta.json
        run: |
          bun scripts/release/generate-release-meta.ts "${{ steps.version.outputs.tag }}" > artifacts/release-meta.json
          cat artifacts/release-meta.json

      - name: Package target tarballs
        id: package
        run: bun scripts/ci/package-release-tarballs.ts "${{ steps.version.outputs.version }}"

      - name: Upload packaged release candidates
        uses: actions/upload-artifact@v4
        with:
          name: release-package
          path: |
            CHANGELOG.md
            artifacts/guard-${{ steps.version.outputs.version }}-*.tar.gz
            artifacts/checksums.txt
            artifacts/release-meta.json
          retention-days: 5

      - name: Dry-run summary
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        run: bun scripts/ci/write-release-dry-run-summary.ts "${{ steps.version.outputs.tag }}"

  install_smoke:
    name: Hardened install smoke
    needs: package
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - name: Checkout exact release commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 1

      - name: Download packaged release candidates
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: release-package

      - name: Stage release artifact
        run: |
          set -euo pipefail
          mkdir -p local-release
          case "$(uname -m)" in
            arm64) target="aarch64-apple-darwin" ;;
            x86_64) target="x86_64-apple-darwin" ;;
            *)
              echo "unsupported macOS runner architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac
          tarball="release-package/artifacts/guard-${{ needs.package.outputs.version }}-${target}.tar.gz"
          test -f "$tarball"
          tar -xzf "$tarball" -C local-release
          ./local-release/stt-guard --version
          ./local-release/stt-guard install-system --help

      - name: Verify hardened system install path
        run: |
          set -euo pipefail
          set +e
          install_output="$(./local-release/stt-guard install-system --yes 2>&1)"
          install_status=$?
          set -e
          printf '%s\n' "$install_output"
          if [ "$install_status" -eq 0 ]; then
            /usr/local/libexec/stt-guard/stt-guard status
            exit 0
          fi
          exit "$install_status"

      - name: Cleanup hardened system install smoke
        if: always()
        run: |
          sudo -n launchctl bootout system/io.stentorian.guard.daemon 2>/dev/null || true
          sudo -n rm -f /Library/LaunchDaemons/io.stentorian.guard.daemon.plist
          sudo -n rm -rf /usr/local/libexec/stt-guard
          sudo -n rm -rf "/Library/Application Support/Stentorian Guard"
          sudo -n rm -rf /var/log/stt-guard

  publish:
    name: Create release
    needs:
      - package
      - install_smoke
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged release candidates
        uses: actions/download-artifact@v4
        with:
          name: release-package
          path: release-package

      - name: Create GitHub Release
        if: github.event_name == 'push' || inputs.dry_run == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.package.outputs.tag }}
          name: Guard ${{ needs.package.outputs.version }}
          body_path: release-package/CHANGELOG.md
          files: |
            release-package/artifacts/guard-${{ needs.package.outputs.version }}-*.tar.gz
            release-package/artifacts/checksums.txt
            release-package/artifacts/release-meta.json
