# Opt-in sccache evaluation. This workflow measures cache behavior only; it is
# not part of required PR validation and build correctness must not depend on
# cache hits.

name: sccache-eval

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  evaluate:
    name: Evaluate sccache (${{ matrix.command_name }})
    runs-on: macos-14
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - command_name: check
            command: cargo check --workspace
          - command_name: release-build
            command: cargo build --workspace --release
          - command_name: test-build
            command: cargo test --workspace --exclude guard-e2e --lib --bins --no-run

    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-rust
        with:
          shared-key: sccache-eval-${{ matrix.command_name }}

      - uses: mozilla-actions/sccache-action@v0.0.9

      - name: Reset sccache stats
        run: sccache --zero-stats

      - name: Run measured Cargo command
        run: ${{ matrix.command }}

      - name: Report sccache stats
        if: always()
        run: sccache --show-stats
