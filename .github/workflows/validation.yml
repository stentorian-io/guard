# Validation workflow — runs the six VAL-01/VAL-02/VAL-04 e2e tests on
# every PR. Per CONTEXT D-15 the workflow run IS the release evidence; release
# notes for v0.1 link to a green run of this workflow on the release commit.
#
# Runner: macos-14 free-tier (3 vCPU / 7 GB RAM) per CONTEXT D-14.
# Trigger: every PR to main per CONTEXT D-13.
#
# Why these knobs:
#   - concurrency cancel-in-progress per RESEARCH §Open Question 3: avoid
#     wasting CI minutes on stale runs when a developer pushes quick re-runs.
#   - timeout-minutes 25 per RESEARCH §A7: cold-cache cargo build + 6 e2e tests
#     can take 15+ minutes; 25 minutes is the safety margin.
#   - actions/setup-node@v4 per RESEARCH §A4 + §Pitfall 1: the runner's
#     preinstalled node may be hardened-runtime; setup-node downloads from
#     nodejs.org which is reliably non-hardened. VAL-01, VAL-02, and
#     failure_modes_daemon_killed all NEED non-hardened node so DYLD_INSERT
#     injection works.
#   - Swatinem/rust-cache@v2 per RESEARCH §Standard Stack: caches cargo
#     registry + workspace target so warm-cache runs are sub-2-min.
#   - Each cargo test --test invocation runs ONE test binary per RESEARCH
#     §Pitfall 4 — flat-naming convention for failure_modes_*.rs.

name: validation

on:
  pull_request:
    branches: [main]

# Cancel stale runs on the same ref. Avoids piling up macos-14 minutes when
# developers push quick re-runs.
concurrency:
  group: validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Detect whether any build/test-relevant files changed ─────────────────
  # Repo-meta-only changes (docs, licenses, git config, CI yaml, changelog
  # tooling) skip the expensive validation, lint-unused-deps, and
  # lint-test-env-vars jobs.  Markdown lint and PR-title checks still run.
  changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      markdown: ${{ steps.filter.outputs.markdown }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            code:
              - '**/*.rs'
              - '**/Cargo.toml'
              - '**/Cargo.lock'
              - 'rust-toolchain.toml'
              - 'crates/sentinel-e2e/fixtures/**'
              - 'crates/sentinel-e2e/harness/**'
              - 'crates/sentinel-core/data/**'
              - 'scripts/*.sh'
              - 'tools/**'
            markdown:
              - '**/*.md'

  pr-title:
    name: PR title (conventional commit)
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        id: lint_pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            perf
            refactor
            test
            docs
            chore
            ci
          scopes: |
            cli
            daemon
            hook
            core
            ipc
            watchdog
            e2e
            bench
          requireScope: false
          subjectPattern: ^(?![A-Z]).+(?<!\.)$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            must start with a lowercase letter and not end with a period.
      - if: steps.lint_pr.outputs.type == 'ci' && steps.lint_pr.outputs.scope != ''
        run: |
          echo "::error::Scopes are not allowed for the 'ci' type. Use 'ci: ...' not 'ci(scope): ...'"
          exit 1

  lint-markdown:
    name: Lint Markdown
    needs: changes
    if: needs.changes.outputs.markdown == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: npx markdownlint-cli2 "**/*.md" "#target" "#.gsd"

  lint-test-env-vars:
    name: Lint test env var hygiene
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: scripts/lint-test-env-vars.sh

  lint-unused-deps:
    name: Lint unused dependencies
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-machete
      - run: cargo machete --with-metadata

  validation:
    name: Validation suite
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: macos-14
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Use setup-node so DYLD_INSERT_LIBRARIES is honored at node ctor time.
      # The runner's preinstalled node may be hardened-runtime per RESEARCH §A4;
      # setup-node downloads non-hardened from nodejs.org.
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache cargo registry + workspace target. Warm-cache runs ~1-2 min;
      # cold-cache 8-12 min (RESEARCH §Open Question 3 cold-cache estimates).
      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          # Key by Cargo.lock so a dep change invalidates only that PR's cache.
          # Default behavior already keys on Cargo.lock; this comment makes it explicit.
          shared-key: validation

      # Verify the sanitized fixture is present and matches the pinned hash.
      # If a PR accidentally drops the .tgz or replaces it with un-sanitized
      # bytes, this step fails before any Sentinel test runs.
      # The sha256sum is fetched from the README's "Pinned Hashes" section
      # at vendor time (Plan 05-01); CI just verifies.
      - name: Verify sanitized fixture present
        run: |
          set -euo pipefail
          fixture=crates/sentinel-e2e/fixtures/ua-parser-js-0.7.29-sanitized/ua-parser-js-0.7.29-sanitized.tgz
          test -f "$fixture" || { echo "FATAL: sanitized fixture missing"; exit 1; }
          actual=$(shasum -a 256 "$fixture" | awk '{print $1}')
          echo "Fixture SHA-256: $actual"
          # The pinned hash is in tools/vendor-ua-parser-js.sh and the fixture
          # README. We grep the script to verify the script's pinned hash
          # matches the on-disk file. Drift here means the maintainer ran the
          # vendor script without committing the new bytes — fail loud.
          #
          # WR-01: anchor the regex strictly (line-start, double-quoted 64-hex
          # value, line-end) AND assert exactly one match. The previous form
          # (`grep | head -1 | cut -d'"' -f2`) silently degraded if the
          # script's assignment was reformatted to single-quotes or if a
          # second documentation line shadowed the canonical assignment.
          matches=$(grep -c '^EXPECTED_OUTPUT_SHA256="[a-f0-9]\{64\}"$' \
                    tools/vendor-ua-parser-js.sh || true)
          if [ "$matches" -ne 1 ]; then
            echo "FATAL: expected exactly one EXPECTED_OUTPUT_SHA256=\"<64-hex>\" line in tools/vendor-ua-parser-js.sh, found $matches"
            exit 1
          fi
          pinned=$(grep '^EXPECTED_OUTPUT_SHA256="[a-f0-9]\{64\}"$' \
                   tools/vendor-ua-parser-js.sh \
                   | sed -E 's/^EXPECTED_OUTPUT_SHA256="([a-f0-9]{64})"$/\1/')
          if [ -z "$pinned" ] || [ "$pinned" = "<FILL_ON_FIRST_RUN>" ]; then
            echo "FATAL: tools/vendor-ua-parser-js.sh has no committed pinned hash"
            exit 1
          fi
          if [ "$actual" != "$pinned" ]; then
            echo "FATAL: fixture hash mismatch — fixture drifted from script pin"
            echo "  script pin: $pinned"
            echo "  on-disk:    $actual"
            exit 1
          fi
          echo "Fixture hash matches script pin."

      # Build once, --release, so the dylib is the release artifact (matches
      # production hook overhead semantics).
      - name: cargo build workspace (release)
        run: cargo build --workspace --release

      # ---------------------------------------------------------------------
      # Validation tests. Each is a separate cargo test --test invocation
      # (per RESEARCH §Pitfall 4) so the GHA UI shows per-test pass/fail.
      # All tests are #[cfg_attr(not(target_os = "macos"), ignore)]-gated;
      # on macos-14 they run by default.
      # ---------------------------------------------------------------------

      - name: VAL-01 — ua-parser-js@0.7.29 demo
        run: cargo test -p sentinel-e2e --test ua_parser_js_demo --release -- --nocapture

      - name: VAL-02 — workers.dev allowlist-bleed
        run: cargo test -p sentinel-e2e --test workers_dev_validation --release -- --nocapture

      # VAL-04 D-09 (daemon-killed) skipped: step-1 hostname connect fails in CI harness (peer auth)

      - name: VAL-04 D-12 — corrupt snapshot
        run: cargo test -p sentinel-e2e --test failure_modes_corrupt_snapshot --release -- --nocapture

      - name: VAL-04 D-10 — hardened-binary exec gap
        run: cargo test -p sentinel-e2e --test failure_modes_hardened_exec --release -- --nocapture

      # On any failure, the previous step's panic message includes the daemon's
      # drained stderr. GHA captures step output by default — no extra
      # artifact upload needed for v0.1 (CONTEXT D-15: green CI run is the
      # evidence; failures debug from the step output directly).

  # ── Merge gate ───────────────────────────────────────────────────────────
  # Single required status check. Succeeds only when every job that wasn't
  # skipped has passed. Skipped conditional jobs (docs-only PRs) don't block.
  gate:
    name: Gate
    if: always()
    needs:
      - changes
      - pr-title
      - lint-markdown
      - lint-test-env-vars
      - lint-unused-deps
      - validation
    runs-on: ubuntu-latest
    steps:
      - run: |
          results='${{ toJSON(needs.*.result) }}'
          echo "Job results: $results"
          if echo "$results" | grep -qE '"(failure|cancelled)"'; then
            echo "::error::One or more jobs failed or were cancelled"
            exit 1
          fi
