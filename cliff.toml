# git-cliff configuration for Sentinel
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to Sentinel are documented in this file.
This changelog is generated from [conventional commits](https://www.conventionalcommits.org/).\n
"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits -%}
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}
{% endfor -%}
{% endfor %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Features" },
    { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
    { message = "^perf", group = "<!-- 2 -->Performance" },
    { message = "^refactor", group = "<!-- 3 -->Refactoring" },
    { message = "^test", group = "<!-- 4 -->Testing" },
    { message = "^doc", group = "<!-- 5 -->Documentation" },
    { message = "^chore", group = "<!-- 6 -->Miscellaneous" },
    { message = "^ci", skip = true },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
