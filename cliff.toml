# git-cliff configuration for Stentorian Guard
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to Stentorian Guard are documented in this file.
This changelog is generated from [conventional commits](https://www.conventionalcommits.org/).\n
"""
body = """
{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] — {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif %}
{%- if version == "v0.1.0" %}
Initial release.
{% else -%}
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits -%}
- {{ commit.message | upper_first }}
{% endfor -%}
{% endfor -%}
{% endif %}\n
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Features" },
    { message = "^fix!?: security:", group = "<!-- 1a -->Security Fixes" },
    { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
    { message = "^perf", group = "<!-- 2 -->Performance" },
    { message = "^docs", skip = true },
    { message = "^test", skip = true },
    { message = "^refactor", skip = true },
    { message = "^chore", skip = true },
    { message = "^build", skip = true },
    { message = "^ci", skip = true },
]
protect_breaking_commits = false
filter_commits = true
tag_pattern = "v[0-9].*"
sort_commits = "oldest"
