# Curated default allowlist + abuse-pattern denies for Sentinel.
# Loaded at daemon startup via include_str!. Reviewed per-PR.
#
# Schema:
#   entries:
#     - kind:    "allow" | "deny"
#       match:   "exact" | "suffix" | "ip"
#       pattern: <string>
#       reason:  <string>   # required, non-empty
#
# Hard rules (D-25) are NOT in this file:
#   - loopback always-allow                 (encoded in policy.rs)
#   - 169.254.169.254 always-deny           (encoded in policy.rs)
#   - raw-IP egress cache-miss-deny         (encoded in policy.rs)
#
# Builtin denies (kind: deny below) are NON-OVERRIDABLE per D-26.

entries:
  # ===== ALLOW-01: JS / npm / Yarn / pnpm / GitHub Packages =====
  - kind: allow
    match: exact
    pattern: registry.npmjs.org
    reason: "npm default registry (ALLOW-01)"
  - kind: allow
    match: exact
    pattern: registry.yarnpkg.com
    reason: "Yarn v1 default registry (ALLOW-01)"
  - kind: allow
    match: exact
    pattern: objects.githubusercontent.com
    reason: "git+ npm deps; Electron prebuilts; node-canvas/sharp postinstalls (ALLOW-01)"
  - kind: allow
    match: suffix
    pattern: .pkg.github.com
    reason: "GitHub Packages registry subdomains (ALLOW-01)"
  - kind: allow
    match: exact
    pattern: nodejs.org
    reason: "node-gyp downloads node headers/prebuilts (ALLOW-01)"
  - kind: allow
    match: exact
    pattern: electronjs.org
    reason: "Electron postinstall downloads (ALLOW-01)"

  # ===== ALLOW-02: Python / pip =====
  - kind: allow
    match: exact
    pattern: pypi.org
    reason: "PyPI JSON API + package metadata (ALLOW-02)"
  - kind: allow
    match: exact
    pattern: files.pythonhosted.org
    reason: "PyPI package file downloads (ALLOW-02)"
  - kind: allow
    match: exact
    pattern: pythonhosted.org
    reason: "Legacy redirect target for files.pythonhosted.org (ALLOW-02)"

  # ===== ALLOW-03: Rust / Cargo =====
  - kind: allow
    match: exact
    pattern: crates.io
    reason: "crates.io metadata redirect (ALLOW-03)"
  - kind: allow
    match: exact
    pattern: static.crates.io
    reason: "Crate tarball downloads (ALLOW-03)"
  - kind: allow
    match: exact
    pattern: index.crates.io
    reason: "Cargo sparse registry index (ALLOW-03)"

  # ===== ALLOW-04: Ruby gems =====
  - kind: allow
    match: exact
    pattern: rubygems.org
    reason: "RubyGems main API (ALLOW-04)"
  - kind: allow
    match: exact
    pattern: api.rubygems.org
    reason: "Bundler API endpoint (ALLOW-04)"
  - kind: allow
    match: suffix
    pattern: .rubygems.org
    reason: "Fastly CDN subdomains for rubygems (ALLOW-04)"

  # ===== ALLOW-04: Go modules =====
  - kind: allow
    match: exact
    pattern: proxy.golang.org
    reason: "Default GOPROXY module proxy (ALLOW-04)"
  - kind: allow
    match: exact
    pattern: sum.golang.org
    reason: "Go checksum database (ALLOW-04)"
  - kind: allow
    match: exact
    pattern: index.golang.org
    reason: "Module version index (ALLOW-04)"
  - kind: allow
    match: exact
    pattern: storage.googleapis.com
    reason: "GCS backend for proxy.golang.org (ALLOW-04, A4 in RESEARCH)"

  # ===== ALLOW-04: Elixir / Hex =====
  - kind: allow
    match: exact
    pattern: hex.pm
    reason: "Hex package manager API (ALLOW-04)"
  - kind: allow
    match: exact
    pattern: repo.hex.pm
    reason: "Hex package repository (ALLOW-04)"
  - kind: allow
    match: exact
    pattern: builds.hex.pm
    reason: "Hex dependency builds (ALLOW-04)"

  # ===== ALLOW-04: PHP / Composer / Packagist =====
  - kind: allow
    match: exact
    pattern: packagist.org
    reason: "Packagist package metadata (ALLOW-04)"
  - kind: allow
    match: exact
    pattern: repo.packagist.org
    reason: "Packagist repository endpoint (ALLOW-04)"

  # ===== ALLOW-04: Java / Maven =====
  - kind: allow
    match: exact
    pattern: repo1.maven.org
    reason: "Maven Central primary mirror (ALLOW-04)"
  - kind: allow
    match: exact
    pattern: repo.maven.apache.org
    reason: "Apache Maven repository (ALLOW-04)"
  - kind: allow
    match: exact
    pattern: central.sonatype.com
    reason: "Sonatype Central Portal (ALLOW-04)"
  - kind: allow
    match: exact
    pattern: search.maven.org
    reason: "Maven Central search/metadata (ALLOW-04)"

  # ===== ALLOW-04: .NET / NuGet =====
  - kind: allow
    match: exact
    pattern: api.nuget.org
    reason: "NuGet API v3 endpoint (ALLOW-04)"
  - kind: allow
    match: exact
    pattern: globalcdn.nuget.org
    reason: "NuGet global CDN (ALLOW-04)"
  - kind: allow
    match: exact
    pattern: dist.nuget.org
    reason: "NuGet distribution endpoint (ALLOW-04)"

  # ===== ALLOW-06: Cloudflare shared CDN abuse patterns =====
  - kind: deny
    match: suffix
    pattern: .workers.dev
    reason: "Cloudflare Workers C2/exfil shared subdomain (ALLOW-06)"
  - kind: deny
    match: suffix
    pattern: .pages.dev
    reason: "Cloudflare Pages phishing/exfil shared subdomain (ALLOW-06)"

  # ===== ALLOW-06: Webhook testing services =====
  - kind: deny
    match: exact
    pattern: webhook.site
    reason: "Webhook testing service often used in malware PoCs (ALLOW-06)"
  - kind: deny
    match: exact
    pattern: hookb.in
    reason: "Webhook testing service (ALLOW-06)"
  - kind: deny
    match: exact
    pattern: requestbin.com
    reason: "Webhook testing service (ALLOW-06)"

  # ===== ALLOW-06: Discord / Telegram webhook endpoints =====
  - kind: deny
    match: exact
    pattern: discord.com
    reason: "Discord webhook exfil (ALLOW-06)"
  - kind: deny
    match: exact
    pattern: discordapp.com
    reason: "Legacy Discord API endpoint (ALLOW-06)"
  - kind: deny
    match: exact
    pattern: ptb.discord.com
    reason: "Discord PTB (ALLOW-06)"
  - kind: deny
    match: exact
    pattern: canary.discord.com
    reason: "Discord Canary (ALLOW-06)"
  - kind: deny
    match: exact
    pattern: api.telegram.org
    reason: "Telegram bot API exfil (ALLOW-06)"

  # ===== ALLOW-06: Paste services =====
  - kind: deny
    match: exact
    pattern: pastebin.com
    reason: "Public paste service often used in malware analysis (ALLOW-06)"
  - kind: deny
    match: exact
    pattern: paste.ee
    reason: "Public paste service (ALLOW-06)"
  - kind: deny
    match: exact
    pattern: dpaste.com
    reason: "Public paste service (ALLOW-06)"
  - kind: deny
    match: exact
    pattern: hastebin.com
    reason: "Public paste service (ALLOW-06)"
  - kind: deny
    match: exact
    pattern: ix.io
    reason: "Public paste service (ALLOW-06)"
  - kind: deny
    match: exact
    pattern: 0x0.st
    reason: "Public paste service (ALLOW-06)"
  - kind: deny
    match: exact
    pattern: transfer.sh
    reason: "Public paste service (ALLOW-06)"

  # ===== ALLOW-07: DoH / DoT endpoints (DNS-as-egress bypass) =====
  - kind: deny
    match: ip
    pattern: 1.1.1.1
    reason: "Cloudflare DoH/DoT (ALLOW-07)"
  - kind: deny
    match: ip
    pattern: 1.0.0.1
    reason: "Cloudflare DoH/DoT alt (ALLOW-07)"
  - kind: deny
    match: exact
    pattern: cloudflare-dns.com
    reason: "Cloudflare DoH hostname (ALLOW-07)"
  - kind: deny
    match: ip
    pattern: 8.8.8.8
    reason: "Google Public DNS DoH (ALLOW-07)"
  - kind: deny
    match: ip
    pattern: 8.8.4.4
    reason: "Google Public DNS DoH alt (ALLOW-07)"
  - kind: deny
    match: exact
    pattern: dns.google
    reason: "Google DoH hostname (ALLOW-07)"
  - kind: deny
    match: ip
    pattern: 9.9.9.9
    reason: "Quad9 DoH (ALLOW-07)"
  - kind: deny
    match: exact
    pattern: dns.quad9.net
    reason: "Quad9 DoH hostname (ALLOW-07)"
  - kind: deny
    match: exact
    pattern: dns.nextdns.io
    reason: "NextDNS DoH (ALLOW-07)"
  - kind: deny
    match: ip
    pattern: 45.90.28.0
    reason: "NextDNS IP (ALLOW-07)"
